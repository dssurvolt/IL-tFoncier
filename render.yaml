services:
  - type: web
    name: ilot-foncier
    env: docker
    plan: free # Plan gratuit (le site s'endort après 15min d'inactivité)
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    preDeployCommand: python manage.py migrate # <--- Migration automatique avant chaque déploiement
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ilot-db
          property: connectionString
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: ALLOWED_HOSTS
        value: "ilotfoncier.com,www.ilotfoncier.com,ilotfoncier.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ilotfoncier.com,https://www.ilotfoncier.com,https://ilot-foncier.onrender.com"

databases:
  - name: ilot-db
    plan: free # Plan gratuit (ATTENTION : La DB expire après 90 jours sur Render Free)
